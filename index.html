<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <form action="#">
            <img src="logo tela de login.png" alt="">
            <h2 id="titulo">Sing in to your account</h2>
            <label for="email"></label>
            <input type="email" placeholder="E-mail" id="input" required>
            <label for="password"></label>
            <input type="password" placeholder="password" id="input" required>
            <div class="remember">
            <input type="checkbox" name="remember" value="remember" id="remember">
            <label for="Remember">Remember me</label>
            <a id="forgot" href="#">Forgot yout password?</a><br>
            </div>
            <button>Sing in</button>
        </form>
    </div>

</body>
</html>
